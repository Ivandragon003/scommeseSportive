
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - TURSO_DATABASE_URL=${TURSO_DATABASE_URL}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN}
      - ODDS_API_KEY=${ODDS_API_KEY}
      - AUTO_SYNC_ON_BOOT=${AUTO_SYNC_ON_BOOT}
      - ODDS_SNAPSHOT_SCHEDULER_ENABLED=${ODDS_SNAPSHOT_SCHEDULER_ENABLED}
      - ODDS_SNAPSHOT_RUN_ON_BOOT=${ODDS_SNAPSHOT_RUN_ON_BOOT}
      - ODDS_SNAPSHOT_INTERVAL_HOURS=${ODDS_SNAPSHOT_INTERVAL_HOURS}
      - ODDS_SNAPSHOT_COMPETITIONS=${ODDS_SNAPSHOT_COMPETITIONS}
      - ODDS_SNAPSHOT_MARKETS=${ODDS_SNAPSHOT_MARKETS}
      - LEARNING_REVIEW_SCHEDULER_ENABLED=${LEARNING_REVIEW_SCHEDULER_ENABLED}
      - LEARNING_REVIEW_RUN_ON_BOOT=${LEARNING_REVIEW_RUN_ON_BOOT}
      - LEARNING_REVIEW_INTERVAL_HOURS=${LEARNING_REVIEW_INTERVAL_HOURS}
      - LEARNING_REVIEW_MATCH_LIMIT=${LEARNING_REVIEW_MATCH_LIMIT}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
