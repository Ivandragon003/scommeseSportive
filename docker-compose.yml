
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - TURSO_DATABASE_URL=${TURSO_DATABASE_URL}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN}
      - ODDS_API_KEY=${ODDS_API_KEY}
      - AUTO_SYNC_ON_BOOT=${AUTO_SYNC_ON_BOOT}
      - ODDS_SNAPSHOT_SCHEDULER_ENABLED=${ODDS_SNAPSHOT_SCHEDULER_ENABLED}
      - ODDS_SNAPSHOT_RUN_ON_BOOT=${ODDS_SNAPSHOT_RUN_ON_BOOT}
      - ODDS_SNAPSHOT_INTERVAL_HOURS=${ODDS_SNAPSHOT_INTERVAL_HOURS}
      - ODDS_SNAPSHOT_COMPETITIONS=${ODDS_SNAPSHOT_COMPETITIONS}
      - ODDS_SNAPSHOT_MARKETS=${ODDS_SNAPSHOT_MARKETS}
      - LEARNING_REVIEW_SCHEDULER_ENABLED=${LEARNING_REVIEW_SCHEDULER_ENABLED}
      - LEARNING_REVIEW_RUN_ON_BOOT=${LEARNING_REVIEW_RUN_ON_BOOT}
      - LEARNING_REVIEW_INTERVAL_HOURS=${LEARNING_REVIEW_INTERVAL_HOURS}
      - LEARNING_REVIEW_MATCH_LIMIT=${LEARNING_REVIEW_MATCH_LIMIT}
      - EUROBET_PERSISTENT_PROFILE_ENABLED=${EUROBET_PERSISTENT_PROFILE_ENABLED:-true}
      - EUROBET_PROFILE_DIR=${EUROBET_PROFILE_DIR:-/app/.playwright/eurobet-profile}
      - EUROBET_EVENT_CONCURRENCY=${EUROBET_EVENT_CONCURRENCY:-1}
      - EUROBET_BROWSER_HEADLESS=${EUROBET_BROWSER_HEADLESS:-true}
      - EUROBET_BROWSER_CHANNEL=${EUROBET_BROWSER_CHANNEL:-}
      - EUROBET_BROWSER_EXECUTABLE_PATH=${EUROBET_BROWSER_EXECUTABLE_PATH:-}
      - EUROBET_BROWSER_SLOW_MO=${EUROBET_BROWSER_SLOW_MO:-0}
      - EUROBET_MATCH_TIMEOUT_MS=${EUROBET_MATCH_TIMEOUT_MS:-7000}
      - ODDS_EVENT_TIMEOUT_MS=${ODDS_EVENT_TIMEOUT_MS:-8000}
      - ODDS_PROVIDER_MATCH_TIMEOUT_MS=${ODDS_PROVIDER_MATCH_TIMEOUT_MS:-9000}
      - ODDS_MATCH_CACHE_TTL_SECONDS=${ODDS_MATCH_CACHE_TTL_SECONDS:-180}
    volumes:
      - backend_eurobet_profile:/app/.playwright/eurobet-profile
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_eurobet_profile:
