name: Eurobet Smoke

on:
  workflow_dispatch:
    inputs:
      competition:
        description: Competizione Eurobet da verificare
        required: true
        default: Serie A
        type: string
      fixtures:
        description: Fixture opzionali, una per riga nel formato homeTeam|awayTeam|commenceTime
        required: false
        default: ''
        type: string
      includeExtendedGroups:
        description: Prova anche il caricamento dei gruppi estesi
        required: true
        default: false
        type: boolean
      verbose:
        description: Mostra i log completi nello step Actions
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  eurobet-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Europe/Rome
      SMOKE_COMPETITION: ${{ inputs.competition }}
      SMOKE_FIXTURES: ${{ inputs.fixtures }}
      SMOKE_INCLUDE_EXTENDED: ${{ inputs.includeExtendedGroups }}
      SMOKE_VERBOSE: ${{ inputs.verbose }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: backend
        run: npx playwright install --with-deps chromium

      - name: Run Eurobet smoke
        id: smoke
        working-directory: backend
        shell: bash
        run: |
          mkdir -p artifacts
          args=(
            --competition "$SMOKE_COMPETITION"
            --report-file "artifacts/eurobet-smoke-report.json"
            --log-file "artifacts/eurobet-smoke.log"
          )

          if [ -n "$SMOKE_FIXTURES" ]; then
            args+=(--fixtures "$SMOKE_FIXTURES")
          fi

          if [ "$SMOKE_INCLUDE_EXTENDED" = "true" ]; then
            args+=(--include-extended-groups)
          fi

          if [ "$SMOKE_VERBOSE" = "true" ]; then
            args+=(--verbose)
          fi

          set +e
          npm run smoke:eurobet -- "${args[@]}"
          exit_code=$?
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Eurobet smoke artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: eurobet-smoke-artifacts
          path: |
            backend/artifacts/eurobet-smoke-report.json
            backend/artifacts/eurobet-smoke.log
          if-no-files-found: warn

      - name: Fail workflow on fatal smoke errors
        if: steps.smoke.outputs.exit_code != '0'
        run: |
          echo "Eurobet smoke fallito con errore fatale. Controlla gli artifact allegati."
          exit 1
