name: Secret Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepare artifact directory
        run: mkdir -p ci-artifacts/secret-scan

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.24.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks scan
        shell: bash
        run: |
          set -euo pipefail
          gitleaks git . \
            --log-opts="--all" \
            --config .gitleaks.toml \
            --redact \
            --report-format sarif \
            --report-path ci-artifacts/secret-scan/gitleaks-report.sarif

      - name: Upload secret scan report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: secret-scan-report
          path: ci-artifacts/secret-scan
          if-no-files-found: ignore
